<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gym tyme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="top">

               <div class="first">
                     <img src="./images/logo-removebg-preview (1).png">
                     <h2>Gym Tyme</h2>
              </div>  

     </section>
     <section class="hero">
    <div class="heading">
                            <h2>Premium Gym Equipment</h2>
                      <p>No Hassle, Free Delivery</p>
                    <img src="./images/body-removebg-preview (2).png">
    </div>
                            
 <div class="middle">
   
    
    <form action="https://submit-form.com/DZViwgPrm">
        <input id="top" class="text" type="text" name="text"  placeholder="Enter your Name"><br>
        <input class="text" type="text" name="mail"   placeholder="Enter your Mail"><br>
 
     <div class="gender">
       
        <input type="radio" name="details" value="Male"><label for="Male">Male</label>
        
        <input type="radio" name="details" value="Female"><label for="Female">Female</label>
    </div>
    <div class="checkboxes">
        <div class="item">
        <input type="checkbox" name="details" value="Weights"><label for="Weights">Weights</label></div>

        <div class="item">
        <input type="checkbox" name="details" value="Dumbells"><label for="Dumbells">Dumbells</label></div>

        <div class="item">
         <input type="checkbox" name="details" value="Ropes"><label for="Ropes">Ropes</label></div>

        <div class="item">
        <input type="checkbox" name="details" value="Shirts"><label for="Shirts">Shirts</label></div>
    </div>
        <input class=" submit" type="submit" value="Book your equipment" id="button">
    </form>

</div></section>

 <section class="equipment">
              <h2>Get your latest equipment</h2>
                                   <div id="tools">
                                      <img  class= "tool" height="80%" width="80%" src="./images/double-removebg-preview.png">
                                      <img class= "tool" height="80%" width="80%" src="./images/two-removebg-preview.png">
                                      <img class= "tool" height="80%" width="80%" src="./images/round-removebg-preview.png">
                                      <img  class= "tool" height="80%" width="80%"src="./images/circle-removebg-preview.png">
                                   </div>   
 </section>


 <section class="bottom">
    <div class="segmentA">
    <h2 id="bag">Equipment</h2>
    <img id="white" height="40%"width="40%" src="./images/bag-removebg-preview.png"></div>
    <div class="segmentB">
    <h2>Membership</h2>
    <img src="./images/membership-removebg-preview (1) (1).png"></div>
 </section>
</body>
</html>
